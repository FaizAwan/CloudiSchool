name: cloudischool_mobile
description: "Ultra-premium CloudiSchool mobile application."
publish_to: 'none'

version: 1.0.1+7

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking & Auth
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

  # AI & Cloud
  google_generative_ai: ^0.4.5

  # UI & Design System
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  fluttertoast: ^8.2.8
  badges: ^3.1.2
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
